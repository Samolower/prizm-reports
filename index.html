<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Prizm — rapports publiés</title>
  <meta name="description" content="Rapports d'analyse de projets crypto édités par Crypto FR via Prizm.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #d4af37;
      --border: #e5e5e5;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 760px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; letter-spacing: -0.01em; }
    .baseline { color: var(--muted); font-style: italic; margin-top: 0; }
    .baseline a { color: var(--accent); text-decoration: none; }
    .baseline a:hover { text-decoration: underline; }
    .reports { list-style: none; padding: 0; margin: 2.5rem 0 1rem; }
    .report {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s, transform 0.15s;
    }
    .report:hover { border-color: var(--accent); transform: translateY(-1px); }
    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .name { font-weight: 600; font-size: 1.1rem; }
    .ticker { color: var(--muted); font-weight: 400; font-size: 0.95rem; }
    .score { font-weight: 600; font-size: 0.95rem; white-space: nowrap; }
    .row-meta { color: var(--muted); font-size: 0.9rem; margin-top: 0.35rem; }
    .row-links { margin-top: 0.65rem; font-size: 0.95rem; }
    .row-links a {
      display: inline-block;
      margin-right: 0.75rem;
      color: var(--text);
      text-decoration: none;
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.15s, background 0.15s;
    }
    .row-links a:hover { border-color: var(--accent); background: #fff8e1; }
    .empty {
      margin-top: 2.5rem;
      padding: 2rem;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      color: var(--muted);
    }
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
